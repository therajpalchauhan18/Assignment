<!-- Task: Create a profile card layout using the box model. The profile card should 
include: 
o A profile picture. 
The user’s name and bio. 
o A button to "Follow" the user.

Additional Requirements: 
o Add padding and borders to the elements. 
o Ensure the layout is clean and centered on the page using CSS margins. 
o Use the box-sizing property to demonstrate both content-box and border-box on different elements. -->

<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>
    <link rel="stylesheet" href="T5.css">
</head>

<body>

    <div class="card">
        <img src="Images/My_image.JPG.jpeg" alt="Profile Picture" class="profile-img">
        <h2 id="username">Rajpal Chauhan</h2>
        <p class="bio">Web developer passionate about creating beautiful websites.</p>
        <button id="follow-btn">Follow</button>

    </div>

</body>
</html>
