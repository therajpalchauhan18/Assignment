<!-- Task: Build a responsive webpage that includes: 
o A navigation bar. 
o A content section with two columns. 
o A footer. 

Additional Requirements: 
o Use media queries to make the webpage responsive for mobile devices. 
o On smaller screens (below 768px), stack the columns vertically. 
o Adjust the font sizes and padding to improve readability on mobile. -->
<!DOCTYPE html>
<html>
<head>
    <title>Responsive Webpage</title>
    <link rel="stylesheet" href="T8.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <h2>My Website</h2>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>

    <!-- Content Section -->
    <div class="container">

        <div class="column">
            <h3>Left Column</h3>
            <p>This is the left content section.</p>
        </div>

        <div class="column">
            <h3>Right Column</h3>
            <p>This is the right content section.</p>
        </div>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
