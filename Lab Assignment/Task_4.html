<!-- Task:-  
Style the contact form (created in the HTML Forms lab) using external CSS. The 
following should be implemented: 
    o Change the background color of the form. 
    o Add padding and margins to form fields. 
    o Style the submit button with a hover effect. 
    o Use class selectors for styling common elements and ID selectors for unique elements. -->

<!DOCTYPE html>
<html>
<head>
    <title>Styled Contact Form</title>

    <link rel="stylesheet" href="T4.css">
</head>

<body>

    <h2 id="form-title">Contact Form</h2>

    <form class="form-container">

        <!-- Full Name -->
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" class="input-field" required><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" class="input-field" required><br><br>

        <!-- Phone -->
        <label for="phone">Phone:</label><br>
        <input type="tel" id="phone" class="input-field" required><br><br>

        <!-- Subject -->
        <label for="subject">Subject:</label><br>
        <select id="subject" class="input-field">
            <option>Select</option>
            <option>Support</option>
            <option>Feedback</option>
        </select><br><br>

        <!-- Message -->
        <label for="message">Message:</label><br>
        <textarea id="message" class="input-field"></textarea><br><br>

        <!-- Button -->
        <button id="submit-btn">Submit</button>

    </form>

</body>
</html>
